<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>대필드 합성 활동지 · 검증용(25필드)</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>:root{--ink:#22301F;--screen:#FAF6EC;--sprout:#3F8F5B;--line:#D8D2C2}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:var(--screen);color:var(--ink);line-height:1.6}header.hero{background:var(--ink);color:var(--screen);padding:40px 20px}h1{font-family:Jua,sans-serif;font-size:34px}main{max-width:880px;margin:0 auto;padding:24px 20px 80px}.scene{margin-bottom:40px}.scene-head{display:flex;gap:12px;align-items:center;margin-bottom:14px}.scene-no{background:var(--ink);color:var(--screen);border-radius:10px;padding:6px 14px;font-family:Jua,sans-serif}h2{font-family:Jua,sans-serif;font-size:24px}.card{background:#fff;border:2px solid var(--ink);border-radius:14px;padding:20px}.write-label{display:block;font-weight:700;color:#2E6B44;margin:12px 0 6px}.write{width:100%;border:2px solid var(--sprout);border-radius:10px;padding:10px;font-size:15px;min-height:60px;resize:vertical}</style></head>
<body><header class="hero"><h1>대필드 합성 활동지 (25필드)</h1><p>그룹 6개에 걸친 25개 입력칸 — 다필드 경로 검증용.</p></header><main><section class="scene"><div class="scene-head"><span class="scene-no">기본 정보</span><h2>기본 정보</h2></div><div class="card"><span class="write-label">이름/모둠</span><textarea class="write" placeholder="여기에 이름/모둠"></textarea><span class="write-label">오늘 각오</span><textarea class="write" placeholder="여기에 오늘 각오"></textarea><span class="write-label">주제 한 줄</span><textarea class="write" placeholder="여기에 주제 한 줄"></textarea></div></section><section class="scene"><div class="scene-head"><span class="scene-no">주인공 설정</span><h2>주인공 설정</h2></div><div class="card"><span class="write-label">주인공 이름</span><textarea class="write" placeholder="여기에 주인공 이름"></textarea><span class="write-label">성격</span><textarea class="write" placeholder="여기에 성격"></textarea><span class="write-label">목표</span><textarea class="write" placeholder="여기에 목표"></textarea><span class="write-label">약점</span><textarea class="write" placeholder="여기에 약점"></textarea></div></section><section class="scene"><div class="scene-head"><span class="scene-no">S#1 도입</span><h2>S#1 도입</h2></div><div class="card"><span class="write-label">장소</span><textarea class="write" placeholder="여기에 장소"></textarea><span class="write-label">시간</span><textarea class="write" placeholder="여기에 시간"></textarea><span class="write-label">첫 대사</span><textarea class="write" placeholder="여기에 첫 대사"></textarea><span class="write-label">지문</span><textarea class="write" placeholder="여기에 지문"></textarea></div></section><section class="scene"><div class="scene-head"><span class="scene-no">S#2 전개</span><h2>S#2 전개</h2></div><div class="card"><span class="write-label">사건</span><textarea class="write" placeholder="여기에 사건"></textarea><span class="write-label">갈등</span><textarea class="write" placeholder="여기에 갈등"></textarea><span class="write-label">대사1</span><textarea class="write" placeholder="여기에 대사1"></textarea><span class="write-label">대사2</span><textarea class="write" placeholder="여기에 대사2"></textarea></div></section><section class="scene"><div class="scene-head"><span class="scene-no">S#3 절정</span><h2>S#3 절정</h2></div><div class="card"><span class="write-label">위기</span><textarea class="write" placeholder="여기에 위기"></textarea><span class="write-label">선택</span><textarea class="write" placeholder="여기에 선택"></textarea><span class="write-label">결말 힌트</span><textarea class="write" placeholder="여기에 결말 힌트"></textarea><span class="write-label">분위기</span><textarea class="write" placeholder="여기에 분위기"></textarea></div></section><section class="scene"><div class="scene-head"><span class="scene-no">마무리</span><h2>마무리</h2></div><div class="card"><span class="write-label">로그라인</span><textarea class="write" placeholder="여기에 로그라인"></textarea><span class="write-label">느낀 점</span><textarea class="write" placeholder="여기에 느낀 점"></textarea><span class="write-label">짝 피드백</span><textarea class="write" placeholder="여기에 짝 피드백"></textarea><span class="write-label">다음 목표</span><textarea class="write" placeholder="여기에 다음 목표"></textarea><span class="write-label">별점 이유</span><textarea class="write" placeholder="여기에 별점 이유"></textarea><span class="write-label">한 줄 소감</span><textarea class="write" placeholder="여기에 한 줄 소감"></textarea></div></section></main>
<script>console.log("inline")</script></body></html>
