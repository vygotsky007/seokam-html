<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>교사 — 활동 등록</title>
<!-- 브라우저에서 PDF → 페이지 이미지 변환 (서버 부담 0) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  :root { --blue: #2b6cb0; --green: #2f855a; --red: #c53030; --line: #e2e8f0; }
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f5f6f8; color: #1a1a1a; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 22px; }
  h2 { font-size: 17px; margin-top: 28px; border-bottom: 2px solid var(--line); padding-bottom: 6px; }
  .card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  label { display: block; font-weight: 600; margin: 12px 0 6px; }
  input[type=text], input[type=number], textarea, select {
    width: 100%; padding: 10px; font-size: 15px; border: 1px solid var(--line); border-radius: 8px; font-family: inherit;
  }
  textarea { min-height: 180px; resize: vertical; }
  .row { display: flex; gap: 10px; align-items: center; }
  .qtable { width: 100%; border-collapse: collapse; margin-top: 8px; }
  .qtable th, .qtable td { border: 1px solid var(--line); padding: 8px; text-align: left; }
  .qtable th { background: #f7fafc; font-size: 13px; }
  .qtable td.num { width: 48px; text-align: center; font-weight: 700; }
  .qtable select { width: 110px; }
  button, a.btn { display: inline-block; padding: 10px 16px; font-size: 15px; font-weight: 700; color: #fff; border: 0; border-radius: 8px; cursor: pointer; line-height: 1.2; }
  .actions a.btn { display: inline-flex; align-items: center; }
  .btn-blue { background: var(--blue); }
  .btn-green { background: var(--green); }
  .btn-gray { background: #718096; }
  .btn-red { background: var(--red); }
  .btn-sm { padding: 6px 10px; font-size: 13px; }
  .link-box { margin-top: 14px; padding: 12px; background: #ebf8ff; border: 1px solid #bee3f8; border-radius: 8px; display: none; }
  .link-box a { color: var(--blue); font-weight: 700; word-break: break-all; }
  .list-table { width: 100%; border-collapse: collapse; }
  .list-table th, .list-table td { border-bottom: 1px solid var(--line); padding: 10px 8px; text-align: left; font-size: 14px; }
  .muted { color: #718096; font-size: 13px; }
  #results { display: none; }
  pre { background: #f7fafc; padding: 10px; border-radius: 8px; overflow-x: auto; font-size: 12px; }
  .actions { display: flex; gap: 6px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>📝 교사 — 활동 등록</h1>

  <div class="card">
    <label for="title">활동 제목</label>
    <input id="title" type="text" placeholder="예) 3단원 쪽지시험" />

    <label for="htmlBody">학생용 HTML (HTML/PDF 올리기 또는 붙여넣기)</label>
    <div class="row" style="margin-bottom:8px;">
      <input id="htmlFile" type="file" accept=".html,.htm" />
      <span class="muted" id="fileHint">.html 파일을 고르면 아래 칸이 자동으로 채워집니다.</span>
    </div>
    <div class="row" style="margin-bottom:8px; flex-wrap:wrap;">
      <input id="pdfFile" type="file" accept=".pdf" />
      <label style="margin:0;">문항 수</label>
      <input id="pdfQcount" type="number" min="1" max="100" value="10" style="width:80px;" />
      <span class="muted" id="pdfHint">PDF를 고르면 브라우저에서 각 페이지를 이미지로 변환하고 답 입력칸(q1..qN)을 붙여 아래 칸을 채웁니다.</span>
    </div>
    <textarea id="htmlBody" placeholder="학생에게 보여줄 문제 HTML을 파일(HTML/PDF)로 올리거나 여기에 붙여넣으세요. 답 입력칸의 name 은 q1, q2, ... 규칙을 사용하세요."></textarea>

    <label style="margin-top:14px;">채점 방식</label>
    <div class="row" style="gap:16px;">
      <label style="margin:0; font-weight:400;"><input type="radio" name="gradeMode" value="teacher" checked /> 교사 정답표</label>
      <label style="margin:0; font-weight:400;"><input type="radio" name="gradeMode" value="self" /> HTML 자가채점</label>
      <span class="muted" id="modeHint">교사 정답표: 아래 문항표에 정답 입력. 자가채점: 문항표 정답 생략(HTML이 스스로 채점).</span>
    </div>

    <div id="qtableWrap">
      <div class="row" style="margin-top:12px;">
        <label style="margin:0;">문항 수</label>
        <input id="qcount" type="number" min="0" max="50" value="3" style="width:90px;" />
        <button class="btn-gray btn-sm" id="buildRows">문항표 만들기</button>
      </div>

      <table class="qtable" id="qtable" style="display:none;">
        <thead>
          <tr><th class="num">번호</th><th>유형</th><th>정답</th></tr>
        </thead>
        <tbody id="qbody"></tbody>
      </table>
    </div>

    <div style="margin-top:16px;">
      <button class="btn-green" id="createBtn">활동 만들기</button>
      <button class="btn-gray" id="cancelEditBtn" style="display:none;">수정 취소</button>
    </div>

    <div class="link-box" id="linkBox">
      ✅ 생성 완료! 학생 응시 주소:<br />
      <a id="goLink" href="#" target="_blank"></a>
      <div class="muted" id="createdId"></div>
    </div>
  </div>

  <h2>기존 활동</h2>
  <div class="card">
    <table class="list-table">
      <thead>
        <tr><th>제목</th><th>상태</th><th>생성일</th><th>동작</th></tr>
      </thead>
      <tbody id="listBody">
        <tr><td colspan="4" class="muted">불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="card" id="results">
    <h2 style="margin-top:0;border:0;">결과 보기</h2>
    <div id="resultsBody"></div>
  </div>
</div>

<script>
var SERVER = window.location.origin;

// ---- 문항표 만들기 ----
document.getElementById('buildRows').addEventListener('click', buildRows);
function buildRows() {
  var n = parseInt(document.getElementById('qcount').value, 10) || 0;
  var body = document.getElementById('qbody');
  body.innerHTML = '';
  for (var i = 1; i <= n; i++) {
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="num">' + i + '</td>' +
      '<td><select class="q-type" data-num="' + i + '">' +
        '<option value="choice">객관식</option>' +
        '<option value="short" selected>단답</option>' +
        '<option value="essay">서술형</option>' +
      '</select></td>' +
      '<td><input type="text" class="q-answer" data-num="' + i + '" placeholder="정답 (name=q' + i + ')" /></td>';
    body.appendChild(tr);
  }
  document.getElementById('qtable').style.display = n ? 'table' : 'none';
  // 유형 바뀌면 서술형 정답칸 비활성
  body.querySelectorAll('.q-type').forEach(function (sel) {
    sel.addEventListener('change', function () { syncAnswerDisabled(sel); });
    syncAnswerDisabled(sel);
  });
}
function syncAnswerDisabled(sel) {
  var num = sel.getAttribute('data-num');
  var ans = document.querySelector('.q-answer[data-num="' + num + '"]');
  if (!ans) return;
  if (sel.value === 'essay') { ans.disabled = true; ans.value = ''; ans.placeholder = '서술형 — 정답 없음'; }
  else { ans.disabled = false; ans.placeholder = '정답 (name=q' + num + ')'; }
}
buildRows(); // 초기 3행

// ---- 파일 올리기 → textarea 자동 채움 ----
document.getElementById('htmlFile').addEventListener('change', function (e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function () {
    document.getElementById('htmlBody').value = reader.result;
    document.getElementById('fileHint').textContent = '✅ ' + file.name + ' 불러옴 (' + reader.result.length + '자). 필요하면 수정하세요.';
  };
  reader.onerror = function () { alert('파일을 읽지 못했습니다.'); };
  reader.readAsText(file, 'utf-8');
});

// ---- PDF 올리기 → 브라우저(pdf.js)에서 페이지 이미지 + 입력칸 HTML 생성 → textarea 채움 ----
if (window.pdfjsLib) {
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
}
document.getElementById('pdfFile').addEventListener('change', function (e) {
  var file = e.target.files && e.target.files[0];
  if (!file) return;
  if (!window.pdfjsLib) { alert('PDF 라이브러리(pdf.js)를 불러오지 못했습니다. 인터넷 연결을 확인하세요.'); return; }

  var hint = document.getElementById('pdfHint');
  var n = parseInt(document.getElementById('pdfQcount').value, 10) || 10;
  hint.textContent = '⏳ ' + file.name + ' 변환 중...';

  var fr = new FileReader();
  fr.onload = function () {
    var typed = new Uint8Array(fr.result);
    pdfjsLib.getDocument({ data: typed }).promise
      .then(function (pdf) { return renderAllPages(pdf, hint, file.name); })
      .then(function (imgTags) {
        var html = buildPdfHtml(imgTags, n);
        document.getElementById('htmlBody').value = html;
        hint.textContent = '✅ ' + file.name + ' → ' + imgTags.length + '페이지 이미지 + ' + n + '문항 입력칸 생성. 필요하면 수정하세요.';
      })
      .catch(function (err) {
        console.error(err);
        alert('PDF 변환 실패: ' + err.message);
        hint.textContent = '❌ 변환 실패: ' + err.message;
      });
  };
  fr.onerror = function () { alert('PDF 파일을 읽지 못했습니다.'); };
  fr.readAsArrayBuffer(file);
});

function renderAllPages(pdf, hint, fname) {
  var tags = [];
  var scale = 1.5;
  var chain = Promise.resolve();
  for (var p = 1; p <= pdf.numPages; p++) {
    (function (pageNum) {
      chain = chain.then(function () {
        return pdf.getPage(pageNum).then(function (page) {
          var viewport = page.getViewport({ scale: scale });
          var canvas = document.createElement('canvas');
          canvas.width = Math.ceil(viewport.width);
          canvas.height = Math.ceil(viewport.height);
          var ctx = canvas.getContext('2d');
          return page.render({ canvasContext: ctx, viewport: viewport }).promise.then(function () {
            var dataUrl = canvas.toDataURL('image/jpeg', 0.85);
            tags.push('<figure class="pdf-page"><img alt="문제지 ' + pageNum + '페이지" src="' + dataUrl + '" /></figure>');
            hint.textContent = '⏳ ' + fname + ' 변환 중... (' + pageNum + '/' + pdf.numPages + '페이지)';
          });
        });
      });
    })(p);
  }
  return chain.then(function () { return tags; });
}

function buildPdfHtml(imgTags, n) {
  var inputs = [];
  for (var i = 1; i <= n; i++) {
    inputs.push(
      '<div class="q-row"><label for="q' + i + '">' + i + '번</label>' +
      '<input type="text" id="q' + i + '" name="q' + i + '" placeholder="' + i + '번 답" autocomplete="off" /></div>'
    );
  }
  return '' +
    '<style>\n' +
    '  /* 교실 PC 좌우 분할: 왼쪽 문제 스크롤, 오른쪽 답 패널 고정 */\n' +
    '  .pdf-doc { display: flex; align-items: flex-start; gap: 20px; max-width: 1200px; margin: 0 auto; }\n' +
    '  .pdf-pages { flex: 0 0 64%; min-width: 0; }\n' +
    '  .pdf-page { margin: 0 0 16px; text-align: center; }\n' +
    '  .pdf-page img { max-width: 100%; height: auto; border: 1px solid #e2e8f0; border-radius: 6px; }\n' +
    '  .pdf-answers { flex: 1 1 36%; position: sticky; top: 0; align-self: flex-start; max-height: 100vh; overflow-y: auto; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; }\n' +
    '  .pdf-answers h3 { margin: 0 0 12px; }\n' +
    '  .q-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }\n' +
    '  .q-row label { flex: 0 0 52px; font-weight: 700; font-size: 15px; }\n' +
    '  .q-row input { flex: 1; padding: 10px 12px; font-size: 16px; border: 1px solid #cbd5e1; border-radius: 6px; }\n' +
    '  .q-row input:focus { outline: none; border-color: #2b6cb0; box-shadow: 0 0 0 3px rgba(43,108,176,.15); background: #fffef5; }\n' +
    '  /* 모바일: 위아래로 접되 답 패널은 상단 sticky 유지 */\n' +
    '  @media (max-width: 768px) {\n' +
    '    .pdf-doc { flex-direction: column; gap: 12px; }\n' +
    '    .pdf-pages { flex: none; width: 100%; order: 2; }\n' +
    '    .pdf-answers { flex: none; width: 100%; order: 1; position: sticky; top: 0; max-height: 45vh; z-index: 20; box-shadow: 0 2px 8px rgba(0,0,0,.12); }\n' +
    '  }\n' +
    '</style>\n' +
    '<div class="pdf-doc">\n' +
    '  <div class="pdf-pages">\n' +
    '    ' + imgTags.join('\n    ') + '\n' +
    '  </div>\n' +
    '  <div class="pdf-answers">\n' +
    '    <h3>✏️ 답 입력</h3>\n' +
    '    ' + inputs.join('\n    ') + '\n' +
    '  </div>\n' +
    '</div>';
}

// ---- 채점 방식 토글: 자가채점이면 문항표 정답 입력 숨김(생략 가능) ----
function currentGradeMode() {
  var sel = document.querySelector('input[name="gradeMode"]:checked');
  return sel ? sel.value : 'teacher';
}
function syncGradeMode() {
  var self = currentGradeMode() === 'self';
  document.getElementById('qtableWrap').style.display = self ? 'none' : 'block';
}
document.querySelectorAll('input[name="gradeMode"]').forEach(function (r) {
  r.addEventListener('change', syncGradeMode);
});
syncGradeMode();

// ---- 등록/수정 상태 ----
var editingId = null; // null 이면 신규 등록, 값이 있으면 그 활동 수정(PUT)

function collectQuestions() {
  if (currentGradeMode() === 'self') return []; // 자가채점: 정답표 없음
  var questions = [];
  document.querySelectorAll('.q-type').forEach(function (sel) {
    var num = parseInt(sel.getAttribute('data-num'), 10);
    var type = sel.value;
    var ansEl = document.querySelector('.q-answer[data-num="' + num + '"]');
    var answer = type === 'essay' ? '' : (ansEl ? ansEl.value.trim() : '');
    questions.push({ num: num, type: type, answer: answer });
  });
  return questions;
}

// ---- 활동 만들기 / 수정 반영 ----
document.getElementById('createBtn').addEventListener('click', function () {
  var title = document.getElementById('title').value.trim();
  var html_body = document.getElementById('htmlBody').value;
  if (!title) { alert('활동 제목을 입력하세요.'); return; }
  if (!html_body.trim()) { alert('학생용 HTML을 붙여넣으세요.'); return; }

  var questions = collectQuestions();
  var btn = this;
  var isEdit = !!editingId;
  btn.disabled = true; btn.textContent = isEdit ? '수정 중...' : '만드는 중...';

  var url = isEdit ? (SERVER + '/api/activities/' + editingId) : (SERVER + '/api/activities');
  var method = isEdit ? 'PUT' : 'POST';

  fetch(url, {
    method: method,
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: title, html_body: html_body, questions: questions }),
  })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data.ok) throw new Error(data.error || (isEdit ? '수정 실패' : '생성 실패'));
      if (isEdit) {
        alert('수정 반영 완료! (version ' + data.version + ') 학생 화면은 8초 내 변경 알림을 받습니다.');
        exitEditMode();
      } else {
        var goUrl = SERVER + '/go/' + data.activityId;
        var link = document.getElementById('goLink');
        link.href = goUrl; link.textContent = goUrl;
        document.getElementById('createdId').textContent = 'activityId: ' + data.activityId;
        document.getElementById('linkBox').style.display = 'block';
      }
      loadList();
    })
    .catch(function (err) { alert('실패: ' + err.message); })
    .finally(function () { btn.disabled = false; btn.textContent = editingId ? '수정 반영' : '활동 만들기'; });
});

// ---- 수정 모드 진입/종료 ----
function enterEditMode(id) {
  fetch(SERVER + '/api/activities/' + id)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data.ok) throw new Error(data.error || '조회 실패');
      editingId = id;
      document.getElementById('title').value = data.activity.title || '';
      document.getElementById('htmlBody').value = data.activity.html_body || '';

      var qs = data.questions || [];
      // 채점 방식 추정: 문항이 있으면 교사 정답표, 없으면 자가채점
      var mode = qs.length ? 'teacher' : 'self';
      document.querySelector('input[name="gradeMode"][value="' + mode + '"]').checked = true;
      syncGradeMode();

      if (qs.length) {
        document.getElementById('qcount').value = qs.length;
        buildRows();
        qs.forEach(function (q) {
          var sel = document.querySelector('.q-type[data-num="' + q.num + '"]');
          var ans = document.querySelector('.q-answer[data-num="' + q.num + '"]');
          if (sel) { sel.value = q.type || 'short'; syncAnswerDisabled(sel); }
          if (ans && q.type !== 'essay') ans.value = q.answer || '';
        });
      }

      document.getElementById('createBtn').textContent = '수정 반영';
      document.getElementById('cancelEditBtn').style.display = 'inline-block';
      document.getElementById('linkBox').style.display = 'none';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    })
    .catch(function (err) { alert('수정 준비 실패: ' + err.message); });
}
function exitEditMode() {
  editingId = null;
  document.getElementById('createBtn').textContent = '활동 만들기';
  document.getElementById('cancelEditBtn').style.display = 'none';
  document.getElementById('title').value = '';
  document.getElementById('htmlBody').value = '';
}
document.getElementById('cancelEditBtn').addEventListener('click', exitEditMode);

// ---- 활동 목록 ----
function loadList() {
  fetch(SERVER + '/api/activities')
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var body = document.getElementById('listBody');
      if (!data.ok || !data.activities.length) {
        body.innerHTML = '<tr><td colspan="4" class="muted">아직 활동이 없습니다.</td></tr>';
        return;
      }
      body.innerHTML = '';
      data.activities.forEach(function (a) {
        var tr = document.createElement('tr');
        var when = a.created_at ? new Date(a.created_at).toLocaleString('ko-KR') : '';
        tr.innerHTML =
          '<td>' + escapeHtml(a.title || '(제목 없음)') + '<div class="muted">' +
            '<a href="' + SERVER + '/go/' + a.id + '" target="_blank">/go/' + a.id.slice(0, 8) + '…</a></div></td>' +
          '<td>' + escapeHtml(a.status || '') + '</td>' +
          '<td class="muted">' + when + '</td>' +
          '<td class="actions">' +
            '<button class="btn-blue btn-sm" data-act="result" data-id="' + a.id + '">결과 보기</button>' +
            '<a class="btn btn-green btn-sm" href="' + SERVER + '/present/' + a.id + '" target="_blank" style="text-decoration:none;">발표 모드</a>' +
            '<button class="btn-gray btn-sm" data-act="edit" data-id="' + a.id + '">수정</button>' +
            '<button class="btn-red btn-sm" data-act="delete" data-id="' + a.id + '">삭제</button>' +
          '</td>';
        body.appendChild(tr);
      });
      body.querySelectorAll('button[data-act]').forEach(function (b) {
        b.addEventListener('click', function () {
          var id = b.getAttribute('data-id');
          var act = b.getAttribute('data-act');
          if (act === 'delete') deleteActivity(id);
          else if (act === 'edit') enterEditMode(id);
          else showResults(id);
        });
      });
    });
}

function deleteActivity(id) {
  if (!confirm('이 활동과 딸린 제출을 모두 삭제할까요?')) return;
  fetch(SERVER + '/api/activities/' + id, { method: 'DELETE' })
    .then(function (r) { return r.json(); })
    .then(function (data) {
      if (!data.ok) throw new Error(data.error || '삭제 실패');
      loadList();
      document.getElementById('results').style.display = 'none';
    })
    .catch(function (err) { alert('삭제 실패: ' + err.message); });
}

function showResults(id) {
  fetch(SERVER + '/api/submissions?activityId=' + id)
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var box = document.getElementById('results');
      var out = document.getElementById('resultsBody');
      box.style.display = 'block';
      if (!data.ok || !data.submissions.length) {
        out.innerHTML = '<p class="muted">아직 제출이 없습니다.</p>';
        box.scrollIntoView({ behavior: 'smooth' });
        return;
      }
      var html = '<table class="list-table"><thead><tr><th>닉네임</th><th>점수</th><th>제출시각</th><th>답안</th></tr></thead><tbody>';
      data.submissions.forEach(function (s) {
        var when = s.created_at ? new Date(s.created_at).toLocaleString('ko-KR') : '';
        html += '<tr><td>' + escapeHtml(s.nickname || '(익명)') + '</td>' +
          '<td><b>' + (s.auto_score == null ? '-' : s.auto_score) + '</b></td>' +
          '<td class="muted">' + when + '</td>' +
          '<td><pre>' + escapeHtml(JSON.stringify(s.answers || {}, null, 1)) + '</pre></td></tr>';
      });
      html += '</tbody></table>';
      out.innerHTML = html;
      box.scrollIntoView({ behavior: 'smooth' });
    })
    .catch(function (err) { alert('결과 조회 실패: ' + err.message); });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

loadList();
</script>
</body>
</html>
