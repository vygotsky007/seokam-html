<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>문제샘 — 올리면, 수업이 됩니다</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; margin: 0; background: #f5f6f8; color: #1a2330; }
  .wrap { max-width: 520px; margin: 0 auto; padding: 28px 18px 40px; }
  header { text-align: center; margin-bottom: 22px; }
  header .logo { font-size: 30px; font-weight: 900; letter-spacing: -.5px; }
  header .tag { color: #718096; font-size: 15px; margin-top: 4px; }
  .card { background: #fff; border: 1px solid #e6e9ef; border-radius: 18px; padding: 22px 20px; margin-bottom: 16px; box-shadow: 0 4px 18px rgba(0,0,0,.05); }
  /* 학생 카드 — 크게, 먼저 */
  .card.student { border: 2px solid #2f855a; }
  .card h2 { font-size: 19px; margin: 0 0 4px; }
  .card .sub { color: #718096; font-size: 13.5px; margin: 0 0 14px; }
  .codebox { display: flex; gap: 10px; }
  .codebox input { flex: 1; padding: 16px; font-size: 34px; text-align: center; letter-spacing: 12px; border: 2px solid #cbd5e1; border-radius: 12px; font-weight: 800; min-width: 0; }
  .codebox input:focus { outline: none; border-color: #2f855a; }
  .codebox button { padding: 0 20px; font-size: 17px; font-weight: 800; color: #fff; background: #2f855a; border: 0; border-radius: 12px; cursor: pointer; white-space: nowrap; }
  .err { color: #c53030; font-size: 13px; margin-top: 10px; min-height: 18px; }
  /* 선생님 카드 */
  .card.teacher .row { display: flex; align-items: center; gap: 12px; }
  .card.teacher .row .txt { flex: 1; }
  .card.teacher a.btn { display: inline-block; padding: 12px 18px; font-size: 15px; font-weight: 800; color: #fff; background: #2b6cb0; border-radius: 10px; text-decoration: none; white-space: nowrap; }
  footer { text-align: center; color: #a0aec0; font-size: 12px; margin-top: 18px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">📝 문제샘</div>
    <div class="tag">올리면, 수업이 됩니다</div>
  </header>

  <!-- 학생: 크게, 먼저 -->
  <div class="card student">
    <h2>🙋 학생이에요</h2>
    <p class="sub">선생님이 알려준 <b>4자리 숫자</b>를 넣고 입장하세요.</p>
    <div class="codebox">
      <input id="code" type="tel" inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off" aria-label="입장 코드 4자리" />
      <button id="go" type="button">입장</button>
    </div>
    <div class="err" id="err"></div>
  </div>

  <!-- 선생님 -->
  <div class="card teacher">
    <div class="row">
      <div class="txt">
        <h2>🧑‍🏫 선생님이에요</h2>
        <p class="sub" style="margin:0">시험지·활동지를 올려 QR 로 배포하고 실시간으로 봅니다.</p>
      </div>
      <a class="btn" href="/teacher.html">활동 만들기 →</a>
    </div>
  </div>

  <footer>© 문제샘 · 학생 응답 수집</footer>
</div>

<script>
  var input = document.getElementById('code');
  var err = document.getElementById('err');
  try { input.focus(); } catch (e) {}
  input.addEventListener('input', function () { input.value = input.value.replace(/[^0-9]/g, ''); err.textContent = ''; });
  function enter() {
    var code = (input.value || '').trim();
    if (!/^[0-9]{4}$/.test(code)) {
      err.textContent = code.length && /[^0-9]/.test(code) ? '숫자만 넣어 주세요.'
        : '4자리 숫자를 정확히 입력하세요.';
      return;
    }
    window.location.href = '/join/' + code;   // 서버가 해당 활동으로 리다이렉트(없으면 안내)
  }
  document.getElementById('go').addEventListener('click', enter);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') enter(); });
</script>
</body>
</html>
